name: Update Profile Stats

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Generate GitHub Profile Trophy
  # ─────────────────────────────────────────────────────────────
  profile-trophy:
    name: Generate Profile Trophy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate trophy
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: Kogia-sima
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit trophy SVG
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ./trophy.svg
          git diff --cached --quiet || git commit -m "chore: update profile trophy [skip ci]"
          git push

  # ─────────────────────────────────────────────────────────────
  # Job 2: Generate GitHub Profile Summary Cards
  # ─────────────────────────────────────────────────────────────
  profile-summary-cards:
    name: Generate Profile Summary Cards
    runs-on: ubuntu-latest
    needs: profile-trophy  # run after trophy to avoid push conflicts
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: Kogia-sima
          BRANCH_NAME: main
